name: Bug report
description: Report something that is not working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in the sections
        below so we can reproduce and diagnose the issue quickly.

  - type: input
    id: version
    attributes:
      label: Package version
      description: Output of `composer show phpnl/mcp | grep versions` or the installed tag.
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: php-version
    attributes:
      label: PHP version
      description: Output of `php -v` (first line).
      placeholder: "PHP 8.3.10"
    validations:
      required: true

  - type: dropdown
    id: transport
    attributes:
      label: Transport
      options:
        - stdio
        - http-sse
        - other / not applicable
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the problem.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal code snippet or commands that reproduce the issue.
      render: php
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or JSON-RPC traffic
      render: shell
